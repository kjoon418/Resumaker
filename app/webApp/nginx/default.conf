server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # index/config는 즉시 반영되도록 캐시 금지(해시 박힌 .js/.wasm은 불변이라 길게 캐시 가능).
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /config.js  { add_header Cache-Control "no-cache"; }

    # ads.txt: AdSense가 루트에서 text/plain으로 읽는다. SPA 폴백(누락 시 index.html)을 타면 HTML이
    # 반환돼 무효가 되므로, 명시적으로 text/plain·없으면 404로 처리한다(40-api-base.sh가 기동 시 생성).
    location = /ads.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    # Wasm은 application/wasm으로 내려야 브라우저가 스트리밍 컴파일한다(구형 nginx mime 대비 명시).
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    # 라우팅 우선순위:
    #  1) 실제 파일($uri) — webApp.js·wasm·favicon·robots.txt·sitemap.xml 등.
    #  2) $uri.html — 공개 콘텐츠 표면(/guide, /about, /privacy …)을 확장자 없는 깔끔한 URL로 제공.
    #  3) /index.html — 위에 없으면 캔버스 앱으로 폴백(SPA 딥링크/새로고침, History API 라우팅).
    location / {
        try_files $uri $uri.html /index.html;
    }
}

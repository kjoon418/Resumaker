spring:
  datasource:
    # H2 in-memory, PostgreSQL 호환 모드. @SpringBootTest/@DataJpaTest 컨텍스트를 H2로 띄운다.
    url: jdbc:h2:mem:resumaker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

spring:
  datasource:
    # H2 in-memory, PostgreSQL 호환 모드. @SpringBootTest/@DataJpaTest 컨텍스트를 H2로 띄운다.
    url: jdbc:h2:mem:resumaker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  # 테스트는 H2 + Hibernate create-drop로 빠르게 띄운다. Flyway 마이그레이션은 PostgreSQL 전용이라 끈다
  # (마이그레이션 자체 검증은 운영 DB(PostgreSQL)에 대한 라이브 적용으로 한다).
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

server:
  # 로컬 기본 포트 8082(브라우저 클라이언트 기본 baseUrl과 일치). 환경변수로 재정의 가능.
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: resumaker
  datasource:
    # 환경변수 우선, 기본값은 로컬 개발 예시(호스트에서 bootRun할 때 localhost의 compose PostgreSQL을 가리킨다).
    # 컨테이너로 띄울 때(compose.yaml의 backend)는 DB_URL이 'postgres' 서비스명을 가리키도록 주입된다.
    # 로컬 bootRun 전에는 `docker compose up -d postgres`로 DB를 먼저 띄운다(README 참고).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumaker}
    username: ${DB_USERNAME:resumaker}
    password: ${DB_PASSWORD:resumaker}
    driver-class-name: org.postgresql.Driver
  data:
    # 인증 토큰(access/refresh) 저장소. 로컬 bootRun은 localhost, 컨테이너는 'redis' 서비스명을 주입받는다.
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 스키마는 Flyway가 관리한다(classpath:db/migration/V*.sql). 기동 시 미적용 마이그레이션을 적용한다.
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  jpa:
    hibernate:
      # Flyway가 스키마의 진실의 원천이므로 Hibernate는 검증만 한다(엔티티 ↔ 스키마 불일치 시 기동 실패).
      # 스키마 변경은 ddl-auto가 아니라 새 마이그레이션(V2 이상)으로만 한다.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# 브라우저 클라이언트(Compose Wasm 웹앱) 허용 오리진. 쉼표로 구분, 와일드카드(*) 포트 허용.
# 운영 배포 시 실제 프런트 도메인으로 좁힌다.
resumaker:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  # 산출물 AI 생성/해석은 개발 단계 비용 0을 위해 Anthropic API가 아닌 Claude CLI 셸 호출로 한다(구현 설계 §12).
  # 모델·타임아웃·실행 경로만 외부화한다(기본값은 ClaudeCliProperties에 정의). 프롬프트·결과는 로깅하지 않는다.
  claude-cli:
    executable-path: ${CLAUDE_CLI_PATH:claude}
    model: ${CLAUDE_CLI_MODEL:claude-sonnet-4-5}
    timeout: ${CLAUDE_CLI_TIMEOUT:120s}
  # 산출물당 보관 버전 수 상한(도메인 이해 §398, 수용 기준 11). 새 버전 추가 경로(재생성·직접 편집)에서
  # 영속과 같은 트랜잭션 안에 가장 오래된 비활성 버전부터 정리한다(활성은 제외). 운영에서 수치만 조정한다.
  artifact:
    version-retention-limit: ${ARTIFACT_VERSION_RETENTION_LIMIT:10}
  # 비용 가드레일 수치(도메인 이해 §394~401, 수용 기준 15). 카운트 대상·차감 시점·리셋 경계(사용자 시간대 달력일)는
  # 코드 고정이고, 수치만 외부화한다(열린질문#1: 운영·비용 데이터로 조정). 1차 생성=사용자당 하루, 재생성=항목당 하루.
  quota:
    daily-initial-generation-limit: ${DAILY_INITIAL_GENERATION_LIMIT:10}
    daily-regeneration-limit-per-section: ${DAILY_REGENERATION_LIMIT_PER_SECTION:5}
  # 비동기 생성 작업 워커 수치. 카운트 대상·차감 시점은 코드 고정이고 여기서는 폴링 주기·고아 회수 기준만 둔다.
  # poll-interval-ms: 워커 폴링 주기(기본 2000ms=2초). stale-running-timeout: RUNNING이 이 시간을 넘기면 고아로
  # 보고 FAILED 회수(기본 PT5M=5분). 재시도하지 않는다(이중 비용 방지).
  generation-job:
    poll-interval-ms: ${GENERATION_JOB_POLL_INTERVAL_MS:2000}
    stale-running-timeout: ${GENERATION_JOB_STALE_RUNNING_TIMEOUT:PT5M}
  # 인증 토큰 수명(불투명 access/refresh). access는 짧게(요청 인증), refresh는 길게(재발급) 둔다.
  # refresh는 사용 시 회전(rotation)되고, 로그아웃·계정삭제 시 Redis에서 즉시 폐기된다.
  auth:
    access-ttl: ${AUTH_ACCESS_TTL:PT30M}
    refresh-ttl: ${AUTH_REFRESH_TTL:P14D}
    # 쿠키 보안 속성. 다른 도메인(cross-site) 전제로 Secure + SameSite=None. 운영은 HTTPS 필수.
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:None}

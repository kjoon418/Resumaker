server:
  # 로컬 기본 포트 8082(브라우저 클라이언트 기본 baseUrl과 일치). 환경변수로 재정의 가능.
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: resumaker
  datasource:
    # 환경변수 우선, 기본값은 로컬 개발 예시.
    # 로컬에서는 루트 compose.yaml의 PostgreSQL을 Spring Boot Docker Compose가 자동 기동·주입한다
    # (도커 엔진만 떠 있으면 됨). 환경변수로 외부 DB를 지정하면 그 값을 사용한다.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumaker}
    username: ${DB_USERNAME:resumaker}
    password: ${DB_PASSWORD:resumaker}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # MVP 편의를 위해 ddl-auto: update 사용.
      # TODO: 운영 전환 시 Flyway 등 마이그레이션 도구로 스키마를 관리한다.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# 브라우저 클라이언트(Compose Wasm 웹앱) 허용 오리진. 쉼표로 구분, 와일드카드(*) 포트 허용.
# 운영 배포 시 실제 프런트 도메인으로 좁힌다.
resumaker:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  # 산출물 AI 생성/해석은 개발 단계 비용 0을 위해 Anthropic API가 아닌 Claude CLI 셸 호출로 한다(구현 설계 §12).
  # 모델·타임아웃·실행 경로만 외부화한다(기본값은 ClaudeCliProperties에 정의). 프롬프트·결과는 로깅하지 않는다.
  claude-cli:
    executable-path: ${CLAUDE_CLI_PATH:claude}
    model: ${CLAUDE_CLI_MODEL:claude-sonnet-4-5}
    timeout: ${CLAUDE_CLI_TIMEOUT:120s}
  # 산출물당 보관 버전 수 상한(도메인 이해 §398, 수용 기준 11). 새 버전 추가 경로(재생성·직접 편집)에서
  # 영속과 같은 트랜잭션 안에 가장 오래된 비활성 버전부터 정리한다(활성은 제외). 운영에서 수치만 조정한다.
  artifact:
    version-retention-limit: ${ARTIFACT_VERSION_RETENTION_LIMIT:10}
  # 비용 가드레일 수치(도메인 이해 §394~401, 수용 기준 15). 카운트 대상·차감 시점·리셋 경계(사용자 시간대 달력일)는
  # 코드 고정이고, 수치만 외부화한다(열린질문#1: 운영·비용 데이터로 조정). 1차 생성=사용자당 하루, 재생성=항목당 하루.
  quota:
    daily-initial-generation-limit: ${DAILY_INITIAL_GENERATION_LIMIT:10}
    daily-regeneration-limit-per-section: ${DAILY_REGENERATION_LIMIT_PER_SECTION:5}

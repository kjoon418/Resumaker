# Cloud Build — 백엔드·프론트엔드 이미지를 빌드해 Artifact Registry에 푸시한다.
#
# 실행(로컬 gcloud, 저장소 루트에서):
#   gcloud builds submit --config cloudbuild.yaml .
#   # 태그를 지정하려면:
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_TAG=v1 .
#
# 사전 준비(1회):
#   gcloud artifacts repositories create resumaker --repository-format=docker --location=us-central1
#   # 푸시 권한이 없다는 에러가 나면 빌드 서비스 계정에 Artifact Registry Writer 부여:
#   #   gcloud projects add-iam-policy-binding <PROJECT_ID> \
#   #     --member="serviceAccount:$(gcloud projects describe <PROJECT_ID> --format='value(projectNumber)')-compute@developer.gserviceaccount.com" \
#   #     --role="roles/artifactregistry.writer"
#
# 결과 이미지(.env.prod의 BACKEND_IMAGE/FRONTEND_IMAGE에 넣는다):
#   us-central1-docker.pkg.dev/$PROJECT_ID/resumaker/backend:<_TAG>
#   us-central1-docker.pkg.dev/$PROJECT_ID/resumaker/frontend:<_TAG>

substitutions:
  _REGION: us-central1
  _REPO: resumaker
  _TAG: latest

steps:
  # ── 백엔드(JRE + Node + claude CLI). 컨텍스트는 저장소 루트, Dockerfile은 server/Dockerfile ──
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - server/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:${_TAG}
      - .

  # ── 프론트엔드(Compose Wasm → nginx). wasm 빌드는 시간이 걸린다 ──
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - app/webApp/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${_TAG}
      - .

# 빌드된 이미지를 Artifact Registry로 푸시한다.
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${_TAG}

options:
  # 트리거가 사용자 지정 서비스계정을 쓰면 기본(Google 소유) 로그 버킷을 못 쓴다.
  # 로그를 Cloud Logging 으로만 보내 그 제약을 피한다.
  logging: CLOUD_LOGGING_ONLY
  # 기본 빌드 머신으로도 동작하지만 wasm 빌드가 느리다. 빠르게 하려면 아래 주석을 풀어 더 큰 머신 사용(소액 과금).
  # machineType: E2_HIGHCPU_8

# 두 이미지 빌드(특히 wasm) 여유를 위해 타임아웃을 넉넉히 둔다.
timeout: 2400s

# Resumaker 로컬·배포 공용 Docker Compose (단일 파일로 일원화).
#
#   로컬: `docker compose up`        → PostgreSQL + 백엔드(8082)가 함께 뜬다.
#   배포: `docker compose up -d`     → 같은 파일에 .env(또는 셸 env)로 운영값을 주입한다.
#
# 모든 값은 ${VAR:-기본값}으로 외부화한다 — 로컬은 기본값으로 바로 동작하고, 배포는 .env로 덮어쓴다.
# 시크릿(ANTHROPIC_API_KEY, DB 비밀번호)은 커밋 금지. .env(gitignore됨) 또는 배포 환경변수로 주입한다.
#
# 백엔드를 호스트에서 빠르게 개발할 때(`./gradlew :server:bootRun`)는 DB만 먼저 띄운다:
#   docker compose up -d postgres
services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: ${DB_NAME:-resumaker}
      POSTGRES_USER: ${DB_USERNAME:-resumaker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resumaker}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      # 명명 볼륨으로 데이터를 보존해 재기동 간 유지한다.
      - 'resumaker-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-resumaker} -d ${DB_NAME:-resumaker}']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    # 로컬: build로 즉석 빌드. 배포: BACKEND_IMAGE로 레지스트리 이미지를 받아 쓰면 build 없이 가볍게 띄울 수 있다.
    build:
      context: .
      dockerfile: server/Dockerfile
    image: ${BACKEND_IMAGE:-resumaker-backend:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 컨테이너 네트워크 안에서는 호스트가 'postgres'(서비스명). 외부 관리형 DB면 DB_URL로 덮어쓴다.
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/resumaker}
      DB_USERNAME: ${DB_USERNAME:-resumaker}
      DB_PASSWORD: ${DB_PASSWORD:-resumaker}
      # 프런트(브라우저) 오리진 허용. 배포 시 실제 도메인으로 좁힌다.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
      # AI 생성/양식 해석용. 이미지에 claude CLI가 설치돼 있고, 인증은 이 키로 한다(없으면 AI 기능만 실패).
      CLAUDE_CLI_MODEL: ${CLAUDE_CLI_MODEL:-claude-sonnet-4-5}
      CLAUDE_CLI_TIMEOUT: ${CLAUDE_CLI_TIMEOUT:-120s}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '${SERVER_PORT:-8082}:8082'

volumes:
  resumaker-postgres-data:

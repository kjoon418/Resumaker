# Resumaker 로컬·배포 공용 Docker Compose (단일 파일로 일원화).
#
#   로컬: `docker compose up`        → PostgreSQL + 백엔드(8082)가 함께 뜬다.
#   배포: `docker compose up -d`     → 같은 파일에 .env(또는 셸 env)로 운영값을 주입한다.
#
# 모든 값은 ${VAR:-기본값}으로 외부화한다 — 로컬은 기본값으로 바로 동작하고, 배포는 .env로 덮어쓴다.
# 시크릿(ANTHROPIC_API_KEY, DB 비밀번호)은 커밋 금지. .env(gitignore됨) 또는 배포 환경변수로 주입한다.
#
# 백엔드를 호스트에서 빠르게 개발할 때(`./gradlew :server:bootRun`)는 DB만 먼저 띄운다:
#   docker compose up -d postgres
services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: ${DB_NAME:-resumaker}
      POSTGRES_USER: ${DB_USERNAME:-resumaker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resumaker}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      # 명명 볼륨으로 데이터를 보존해 재기동 간 유지한다.
      - 'resumaker-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-resumaker} -d ${DB_NAME:-resumaker}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    # 인증 토큰(access/refresh) 저장소. 네이티브 TTL로 만료·자동 로그아웃을 처리하고, DEL로 즉시 폐기한다.
    # 세션 토큰은 휘발성이어도 무방하므로 영속(저장/AOF)을 끈다(재시작 시 재로그인).
    image: 'redis:7-alpine'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    # 로컬: build로 즉석 빌드. 배포: BACKEND_IMAGE로 레지스트리 이미지를 받아 쓰면 build 없이 가볍게 띄울 수 있다.
    build:
      context: .
      dockerfile: server/Dockerfile
    image: ${BACKEND_IMAGE:-resumaker-backend:local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 컨테이너 네트워크 안에서는 호스트가 'postgres'(서비스명). 외부 관리형 DB면 DB_URL로 덮어쓴다.
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/resumaker}
      # 인증 토큰 저장소(Redis). 컨테이너 네트워크에서는 'redis'(서비스명).
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DB_USERNAME: ${DB_USERNAME:-resumaker}
      DB_PASSWORD: ${DB_PASSWORD:-resumaker}
      # 프런트(브라우저) 오리진 허용. 배포 시 실제 도메인으로 좁힌다.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
      # AI 호출 공급자. cli(기본)=이미지의 claude CLI 셸 호출. api=Anthropic Messages API 직접 호출(CLI 프로세스 미사용
      # → 저메모리, 운영 권장). 로컬은 cli + 구독 토큰으로 비용 0.
      LLM_PROVIDER: ${LLM_PROVIDER:-cli}
      # 인증은 공급자에 따라 둘 중 하나(둘 다 비우면 AI 기능만 실패):
      #  - CLAUDE_CODE_OAUTH_TOKEN: Claude 구독(Pro/Max) 토큰(`claude setup-token`). provider=cli 전용·종량 잔액 미사용 → 개발 권장.
      #  - ANTHROPIC_API_KEY: 종량 API 키(잔액 차감). provider=api는 이 키만 유효(구독 토큰 불가).
      CLAUDE_CLI_MODEL: ${CLAUDE_CLI_MODEL:-claude-sonnet-4-5}
      CLAUDE_CLI_TIMEOUT: ${CLAUDE_CLI_TIMEOUT:-120s}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-16000}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '${SERVER_PORT:-8082}:8082'

  seed:
    # 자동 시드(일회성). 백엔드(Flyway)가 스키마를 만든 뒤, DB가 비어 있을 때만 scripts/seed/seed.sql을 적용한다(멱등).
    # 데이터가 이미 있으면 건너뛰므로, 새 볼륨(`docker compose down -v` 후 up)에서만 실제로 시드된다.
    image: 'postgres:16'
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DB_NAME: ${DB_NAME:-resumaker}
      DB_USERNAME: ${DB_USERNAME:-resumaker}
      DB_PASSWORD: ${DB_PASSWORD:-resumaker}
    volumes:
      - './scripts/seed:/seed:ro'
    # CRLF(윈도우 체크아웃) 대비: 실행 전 CR 제거 후 bash로 실행한다.
    entrypoint: ['bash', '-c']
    command: ["sed -e 's/\\r$//' /seed/seed-entrypoint.sh | bash"]
    restart: 'no'

  frontend:
    # Compose Wasm 웹앱을 빌드해 nginx로 정적 서빙(SPA 폴백·wasm MIME). 8081로 노출.
    build:
      context: .
      dockerfile: app/webApp/Dockerfile
    image: ${FRONTEND_IMAGE:-resumaker-frontend:local}
    depends_on:
      - backend
    environment:
      # 브라우저가 호출할 백엔드 주소. 다른 도메인 배포 시 실제 API 도메인으로 지정한다(런타임 config.js로 주입).
      API_BASE: ${API_BASE:-http://localhost:8082}
      # 대기 시간 광고 슬롯 on/off. baseline 측정·킬스위치용. 미지정 시 켜짐(기본 true).
      ADS_ENABLED: ${ADS_ENABLED:-true}
      # AdSense 퍼블리셔 ID(ca-pub-…). 컨테이너 기동 시 ads.txt·소유권 확인 메타 태그·config.js 전역을 굽는다.
      # 미지정(빈 값)이면 AdSense 관련은 전부 무동작. 발급 전까지 비워 둔다.
      ADSENSE_CLIENT: ${ADSENSE_CLIENT:-}
    ports:
      - '${FRONTEND_PORT:-8081}:80'

volumes:
  resumaker-postgres-data:

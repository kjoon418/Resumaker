# 로컬 개발용 PostgreSQL. 백엔드(server) 기본 datasource와 동일한 값으로 띄운다.
# 사용:
#   docker compose up -d        # 기동
#   docker compose down         # 종료(데이터 유지)
#   docker compose down -v      # 종료 + 데이터 삭제
# 백엔드 실행: ./gradlew :server:bootRun  (application.yml 기본값이 이 컨테이너를 가리킨다)
services:
  postgres:
    image: postgres:16-alpine
    container_name: resumaker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-resumaker}
      POSTGRES_USER: ${DB_USERNAME:-resumaker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resumaker}
    ports:
      - "5432:5432"
    volumes:
      - resumaker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-resumaker} -d ${DB_NAME:-resumaker}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  resumaker-pgdata:
